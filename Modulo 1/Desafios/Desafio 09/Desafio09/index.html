<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Vídeos legais para assistir</title>

    <style>
        body {
            margin: 0;
            background-color: #111;
            color: white;
            font-family: Arial, sans-serif;
            text-align: center;
        }

        h1 {
            margin: 30px 0;
        }

        /* Página inicial */
        #home {
            display: block;
        }

        .videos {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            width: 600px;
            margin: 0 auto;
        }

        .videos img {
            width: 100%;
            border-radius: 8px;
            cursor: pointer;
        }

        /* Página do vídeo */
        .pagina-video {
            display: none;
            margin-top: 40px;
        }

        .assistir {
            display: inline-block;
            margin-top: 20px;
            font-size: 22px;
            color: white;
            text-decoration: none;
        }

        .voltar {
            display: inline-block;
            margin-top: 30px;
            font-size: 18px;
            color: white;
            text-decoration: none;
            cursor: pointer;
        }
    </style>
</head>
<body>

<!-- HOME -->
<div id="home">
    <h1>Vídeos legais para assistir</h1>

    <div class="videos">
        <img src="https://img.youtube.com/vi/7jTVI2EmcJo/hqdefault.jpg"
             onclick="abrirVideo('video1')">

        <img src="https://img.youtube.com/vi/STNy1kb6n9v/hqdefault.jpg"
             onclick="abrirVideo('video2')">

        <img src="https://img.youtube.com/vi/K4FP6wWdHny/hqdefault.jpg"
             onclick="abrirVideo('video3')">

        <img src="https://img.youtube.com/vi/1fJ2Rqk7ohG/hqdefault.jpg"
             onclick="abrirVideo('video4')">
    </div>
</div>

<!-- VIDEO 1 -->
<div id="video1" class="pagina-video">
    <h1>Vídeo 1</h1>

    <a class="assistir"
       href="https://youtu.be/7jTVI2EmcJo?si=yUdqhmTKrgKm0aMq"
       target="_blank">
        ▶ Assistir ao vídeo
    </a>

    <div class="voltar" onclick="voltar()">⬅ Voltar</div>
</div>

<!-- VIDEO 2 -->
<div id="video2" class="pagina-video">
    <h1>Vídeo 2</h1>

    <a class="assistir"
       href="https://share.google/STNy1kb6n9vH5Po2M"
       target="_blank">
        ▶ Assistir ao vídeo
    </a>

    <div class="voltar" onclick="voltar()">⬅ Voltar</div>
</div>

<!-- VIDEO 3 -->
<div id="video3" class="pagina-video">
    <h1>Vídeo 3</h1>

    <a class="assistir"
       href="https://share.google/K4FP6wWdHny9rWji2"
       target="_blank">
        ▶ Assistir ao vídeo
    </a>

    <div class="voltar" onclick="voltar()">⬅ Voltar</div>
</div>

<!-- VIDEO 4 -->
<div id="video4" class="pagina-video">
    <h1>Vídeo 4</h1>

    <a class="assistir"
       href="https://youtu.be/zXvEjMi0SdI?si=N8x62lP3J-nGiRpa"
       target="_blank">
        ▶ Assistir ao vídeo
    </a>

    <div class="voltar" onclick="voltar()">⬅ Voltar</div>
</div>

<script>
    function abrirVideo(id) {
        document.getElementById('home').style.display = 'none';

        let paginas = document.querySelectorAll('.pagina-video');
        paginas.forEach(p => p.style.display = 'none');

        document.getElementById(id).style.display = 'block';
    }

    function voltar() {
        let paginas = document.querySelectorAll('.pagina-video');
        paginas.forEach(p => p.style.display = 'none');

        document.getElementById('home').style.display = 'block';
    }
</script>

</body>
</html>
